services:
  # ── Backend (FastAPI) ──
  backend:
    build: ./backend
    container_name: rca-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-all-MiniLM-L6-v2}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - DATABASE_URL=/app/data/analyzer.db
    volumes:
      - backend-data:/app/data
      - chroma-data:/app/chroma_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ──
  frontend:
    build: ./frontend
    container_name: rca-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  chroma-data:
